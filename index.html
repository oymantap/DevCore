<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreBuilder v3 // Scroll Fixed</title>
    <!-- Tailwind CSS (Main UI) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js (State Engine) -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Prism.js Themes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2 family=Plus+Jakarta+Sans:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .code-font { font-family: 'Fira Code', monospace; }
        
        /* SCROLL FIX MECHANISM */
        .editor-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 350px;
        }
        /* Kedua elemen dipaksa punya ukuran, padding, font, dan handling scroll yang IDENTIK */
        .sync-input, .sync-output {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            margin: 0 !important;
            padding: 16px !important;
            font-size: 13px !important;
            line-height: 1.6 !important;
            font-family: 'Fira Code', monospace !important;
            box-sizing: border-box !important;
            overflow: auto !important;
            white-space: pre !important;
            word-wrap: normal !important;
        }
        /* Textarea berada di depan, tulisan transparan tapi caret (kursor) tetep kelihatan */
        .sync-input {
            z-index: 2;
            background: transparent !important;
            color: transparent !important;
            caret-color: #ffffff !important;
            resize: none;
        }
        /* Pre/code berada di belakang untuk menampilkan highlight warna */
        .sync-output {
            z-index: 1;
            pointer-events: none; /* Biar swipe/scroll langsung nembus ke textarea */
        }
    </style>
</head>
<body class="bg-[#090d16] text-slate-200 min-h-screen flex flex-col" 
      x-data="editorApp()" 
      x-init="$watch('code', value => highlightCode())">

    <!-- TOP HEADER -->
    <header class="h-16 border-b border-slate-800 bg-[#0f172a]/90 backdrop-blur-md px-4 md:px-6 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg text-white">
                <i class="fa-solid fa-code text-sm"></i>
            </div>
            <span class="text-xs md:text-sm font-bold tracking-wider text-white">CORE<span class="text-indigo-500">BUILDER v3</span></span>
        </div>

        <div class="flex items-center gap-2">
            <button @click="downloadHtml" class="px-3 py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-xs rounded-lg flex items-center gap-2 transition">
                <i class="fa-solid fa-cloud-arrow-down"></i> <span>Export HTML</span>
            </button>
            <button @click="resetToDefault" class="p-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs transition" title="Reset Default Struktur">
                <i class="fa-solid fa-arrow-rotate-left"></i>
            </button>
        </div>
    </header>

    <!-- MAIN WRAPPER -->
    <main class="flex-1 p-3 md:p-6 grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6 w-full mx-auto max-w-[1700px]">
        
        <!-- KIRI: UTILITY & EDITOR -->
        <div class="flex flex-col gap-4">
            
            <!-- DROPZONE & COLOR PICKER SUITE -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <!-- Dropzone -->
                <div class="sm:col-span-2 border border-dashed border-slate-800 hover:border-indigo-500 bg-[#0f172a] rounded-xl p-3 transition relative flex items-center justify-center"
                     @dragover.prevent="dragOver = true"
                     @dragleave.prevent="dragOver = false"
                     @drop.prevent="handleDrop($event)"
                     :class="dragOver ? 'border-indigo-500 bg-indigo-600/5' : ''"
                     x-data="{ dragOver: false }">
                    <input type="file" id="fileInput" class="hidden" accept="image/*" @change="handleFileSelect($event)">
                    <label for="fileInput" class="cursor-pointer flex items-center gap-3 text-slate-400 hover:text-slate-200">
                        <i class="fa-solid fa-wand-magic-sparkles text-indigo-400 text-lg"></i>
                        <p class="text-xs font-medium">Drop gambar di sini / <span class="text-indigo-400 underline">Klik upload</span></p>
                    </label>
                </div>

                <!-- Color Tool -->
                <div class="bg-[#0f172a] border border-slate-800 rounded-xl p-3 flex items-center justify-between gap-2">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-lg border border-slate-700 relative overflow-hidden flex-shrink-0" :style="`background-color: ${selectedColor}`">
                            <input type="color" x-model="selectedColor" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">
                        </div>
                        <div class="overflow-hidden">
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">HEX Picker</p>
                            <p class="text-xs font-mono font-bold text-white truncate" x-text="selectedColor"></p>
                        </div>
                    </div>
                    <button @click="copyColor" class="p-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-md text-xs transition">
                        <i class="fa-solid fa-copy"></i>
                    </button>
                </div>
            </div>

            <!-- QUICK COLOR PALETTE -->
            <div class="bg-[#0f172a] border border-slate-800 rounded-xl p-3 flex flex-wrap items-center gap-2">
                <span class="text-[10px] text-slate-500 font-bold uppercase tracking-wider mr-1">Preset:</span>
                <template x-for="color in colorPresets">
                    <button @click="selectedColor = color; copyColor()" 
                            class="w-5 h-5 rounded-full border border-slate-900 transition transform hover:scale-110" 
                            :style="`background-color: ${color}`"></button>
                </template>
            </div>

            <!-- EDITOR CONTAINER (FIXED SCROLL) -->
            <div class="flex-1 bg-[#0f172a] rounded-xl border border-slate-800 flex flex-col overflow-hidden min-h-[400px] lg:h-[calc(100vh-240px)]">
                <div class="bg-[#131c31] px-4 py-2 border-b border-slate-800 flex justify-between items-center text-xs text-slate-400">
                    <span class="flex items-center gap-2 font-mono"><i class="fa-solid fa-file-code text-indigo-400"></i> index.html</span>
                    <span class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-indigo-400 font-mono">Scroll & Swipe Fixed</span>
                </div>
                
                <!-- Wrapper Area -->
                <div class="flex-1 editor-wrapper">
                    <!-- TEXTAREA (Input + Scroll Catch) -->
                    <textarea x-model="code" 
                              @scroll="syncScroll($event)"
                              ref="textarea"
                              class="sync-input focus:outline-none focus:ring-0"
                              placeholder="<!-- Tulis kode HTML lu di sini... -->"
                              spellcheck="false"></textarea>
                    
                    <!-- PRE/CODE (Visual Display) -->
                    <pre class="sync-output bg-[#0f172a]" 
                         ref="highlightedArea"><code class="language-html code-font" x-ref="codeOutput"></code></pre>
                </div>
            </div>
        </div>

        <!-- KANAN: LIVE PREVIEW ENGINE -->
        <div class="bg-white rounded-xl border border-slate-900 flex flex-col overflow-hidden min-h-[400px] lg:h-[calc(100vh-120px)]">
            <div class="bg-slate-100 border-b border-slate-200 px-4 py-2.5 flex items-center justify-between text-xs text-slate-600 font-medium">
                <span class="flex items-center gap-2"><i class="fa-solid fa-square-poll-vertical text-emerald-500"></i> Render Engine Output</span>
                <div class="flex gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-slate-300"></span>
                    <span class="w-2 h-2 rounded-full bg-slate-300"></span>
                </div>
            </div>
            <!-- Live Output Viewport -->
            <div class="flex-1 bg-white relative">
                <iframe :srcdoc="code" class="w-full h-full border-none bg-white"></iframe>
            </div>
        </div>
        
    </main>

    <!-- NOTIFICATION SYSTEM -->
    <div x-show="toast.show" x-transition x-cloak class="fixed bottom-6 right-6 bg-slate-900 border border-indigo-500 text-indigo-400 px-4 py-2.5 rounded-xl shadow-2xl z-50 text-xs flex items-center gap-2 font-mono">
        <i class="fa-solid fa-circle-check text-emerald-400"></i>
        <span x-text="toast.message"></span>
    </div>

    <!-- CODE CONTROLLER LOGIC -->
    <script>
        function editorApp() {
            const defaultTemplate = `<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Core App Sandbox</title>\n    <!-- Tailwind CSS Engine -->\n    <script src="https://cdn.tailwindcss.com"><\/script>\n    <!-- Font Icon Pro -->\n    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">\n</head>\n<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-center items-center p-6">\n\n    <!-- Mulai Bikin UI Mantap Lu Di Sini -->\n    <div class="max-w-md w-full bg-slate-800 border border-slate-700 p-6 rounded-2xl shadow-xl text-center">\n        <div class="w-12 h-12 bg-indigo-500/10 text-indigo-400 rounded-xl flex items-center justify-center mx-auto mb-4 text-xl">\n            <i class="fa-solid fa-layer-group"></i>\n        </div>\n        <h1 class="text-xl font-bold tracking-tight text-white">Sandbox Siap Dipake!</h1>\n        <p class="text-xs text-slate-400 mt-2">Struktur HTML5 udah lengkap bawaan pabrik. Coba lu scroll ke bawah atau geser ke samping di editor kiri, sekarang udah lancar jaya.</p>\n    </div>\n\n</body>\n</html>`;

            return {
                code: defaultTemplate,
                selectedColor: '#6366f1',
                colorPresets: ['#0f172a', '#3b82f6', '#6366f1', '#10b981', '#f43f5e', '#f59e0b', '#06b6d4', '#a855f7', '#ec4899', '#ffffff'],
                toast: { show: false, message: '' },

                init() {
                    this.$nextTick(() => this.highlightCode());
                },

                highlightCode() {
                    const target = this.$refs.codeOutput;
                    target.textContent = this.code;
                    Prism.highlightElement(target);
                },

                syncScroll(e) {
                    // Mencegah macet dengan memaksa element PRE mengikuti pixel scroll TEXTAREA
                    const pre = this.$refs.highlightedArea;
                    pre.scrollTop = e.target.scrollTop;
                    pre.scrollLeft = e.target.scrollLeft;
                },

                triggerToast(msg) {
                    this.toast.message = msg;
                    this.toast.show = true;
                    setTimeout(() => this.toast.show = false, 2500);
                },

                copyColor() {
                    navigator.clipboard.writeText(this.selectedColor).then(() => {
                        this.triggerToast(`Copied: ${this.selectedColor}`);
                    });
                },

                handleDrop(e) {
                    const files = e.dataTransfer.files;
                    if (files.length > 0 && files[0].type.startsWith('image/')) {
                        this.processImageFile(files[0]);
                    }
                },

                handleFileSelect(e) {
                    const files = e.target.files;
                    if (files.length > 0) {
                        this.processImageFile(files[0]);
                    }
                },

                processImageFile(file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const base64String = event.target.result;
                        const imgTag = `\n    <!-- Magic Image Uploaded -->\n    <img src="${base64String}" alt="${file.name}" class="max-w-full h-auto rounded-xl border my-4 inline-block">\n`;
                        
                        if (this.code.includes('</body>')) {
                            this.code = this.code.replace('</body>', `${imgTag}</body>`);
                        } else {
                            this.code += imgTag;
                        }
                        this.triggerToast("Gambar masuk ke struktur!");
                    };
                    reader.readAsDataURL(file);
                },

                downloadHtml() {
                    const blob = new Blob([this.code], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'core_project_' + Math.floor(Date.now() / 1000) + '.html';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                },

                resetToDefault() {
                    if (confirm("Balikin isi editor ke default?")) {
                        this.code = defaultTemplate;
                        this.triggerToast("Struktur di-reset!");
                    }
                }
            }
        }
    </script>
</body>
</html>
