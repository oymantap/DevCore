<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCore Interactive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans p-4 md:p-8" x-data="{ activeTab: 'dashboard', sidebarOpen: false }">

    <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-6">
        
        <!-- Sidebar Navigation -->
        <aside class="md:w-64 space-y-4">
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                <h1 class="text-xl font-bold text-white mb-6">CORE<span class="text-indigo-500">.</span>SYSTEM</h1>
                <nav class="space-y-2">
                    <button @click="activeTab = 'dashboard'" :class="activeTab === 'dashboard' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-white'" class="w-full text-left px-4 py-3 rounded-lg transition-all flex items-center gap-3">
                        <i class="fa-solid fa-chart-line"></i> Dashboard
                    </button>
                    <button @click="activeTab = 'tools'" :class="activeTab === 'tools' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-white'" class="w-full text-left px-4 py-3 rounded-lg transition-all flex items-center gap-3">
                        <i class="fa-solid fa-screwdriver-wrench"></i> Toolkits
                    </button>
                </nav>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 bg-slate-900 p-6 md:p-8 rounded-2xl border border-slate-800 min-h-[500px]">
            
            <!-- Dashboard View -->
            <div x-show="activeTab === 'dashboard'" x-cloak class="space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-bold">System Status</h2>
                    <span class="px-3 py-1 bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 rounded-full text-xs font-mono">LIVE</span>
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="p-4 bg-slate-950 rounded-xl border border-slate-800 hover:border-indigo-500 transition cursor-pointer" @click="alert('System Load Normal')">
                        <p class="text-sm text-slate-500">CPU Load</p>
                        <p class="text-xl font-bold">12%</p>
                    </div>
                    <div class="p-4 bg-slate-950 rounded-xl border border-slate-800 hover:border-indigo-500 transition cursor-pointer" @click="alert('Memory Stable')">
                        <p class="text-sm text-slate-500">Memory</p>
                        <p class="text-xl font-bold">4.2GB</p>
                    </div>
                </div>
            </div>

            <!-- Toolkit View -->
            <div x-show="activeTab === 'tools'" x-cloak class="space-y-6">
                <h2 class="text-2xl font-bold">Active Toolkits</h2>
                <div class="grid gap-3">
                    <div class="p-4 bg-slate-950 rounded-xl border border-slate-800 flex justify-between items-center">
                        <div>
                            <p class="font-semibold text-white">JSON Validator</p>
                            <p class="text-xs text-slate-500">Utility for parsing raw data</p>
                        </div>
                        <button class="px-4 py-2 bg-slate-800 hover:bg-indigo-600 rounded-lg text-sm transition" @click="alert('Fungsi dijalankan!')">
                            <i class="fa-solid fa-play"></i> Run
                        </button>
                    </div>
                </div>
            </div>

        </main>
    </div>

</body>
</html>
